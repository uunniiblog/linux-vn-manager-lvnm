name: Build lvnm AppImage

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ] 
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write # Required to create releases

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2
          pip install PySide6 setproctitle requests pyinstaller
          # Add any other requirements from your requirements.txt if needed
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Create AppDir Structure
        run: |
          mkdir -p LVNM.AppDir/usr/bin/tools
          mkdir -p LVNM.AppDir/usr/share/applications
          mkdir -p LVNM.AppDir/usr/share/icons/hicolor/256x256/apps

      # - name: Build Main LVNM Binary
      #   run: |
      #     # Added --exclude-module readline
      #     python -m PyInstaller --noconfirm --windowed \
      #       --exclude-module readline \
      #       --paths . \
      #       --paths lvnm \
      #       --name LVNM lvnm/launcher.py
          
      #     cp -r dist/LVNM/* LVNM.AppDir/usr/bin/
          
      #     # Fix to use with compiled umu
      #     rm -f LVNM.AppDir/usr/bin/libreadline.so*
      #     rm -f LVNM.AppDir/usr/bin/libtinfo.so*

      # - name: Build Bundled umu-run
      #   run: |
      #     pip install git+https://github.com/Open-Wine-Components/umu-launcher.git
          
      #     # Added --exclude-module readline to prevent the onefile from bundling it
      #     python -m PyInstaller --onefile \
      #       --exclude-module readline \
      #       --collect-all umu \
      #       --name umu-run $(which umu-run)
            
      #     cp dist/umu-run LVNM.AppDir/usr/bin/tools/

      - name: Build Main LVNM Binary
        run: |
          python -m PyInstaller --noconfirm --windowed \
            --paths . \
            --paths lvnm \
            --add-data "lvnm/vn_winestuff:lvnm/vn_winestuff" \
            --name LVNM lvnm/launcher.py
          # Move it immediately to avoid collision
          cp -r dist/LVNM/* LVNM.AppDir/usr/bin/
          # Avoid library errors
          rm -f LVNM.AppDir/usr/bin/libreadline.so*
          rm -f LVNM.AppDir/usr/bin/libtinfo.so*

      - name: Bundle umu-run (Latest Stable Zipapp)
        run: |
          # Query GitHub API for the latest non-prerelease
          DOWNLOAD_URL=$(curl -s https://api.github.com/repos/Open-Wine-Components/umu-launcher/releases | \
            jq -r '[.[] | select(.prerelease == false)][0].assets[] | select(.name | contains("zipapp.tar")) | .browser_download_url')
          
          echo "Downloading umu-run from: $DOWNLOAD_URL"
          curl -fL -o umu-zipapp.tar "$DOWNLOAD_URL"
          
          tar -xf umu-zipapp.tar
          cp umu/umu-run LVNM.AppDir/usr/bin/tools/umu-run
          chmod +x LVNM.AppDir/usr/bin/tools/umu-run

      - name: Bundle Winetricks
        run: |
          curl -L -o LVNM.AppDir/usr/bin/tools/winetricks https://raw.githubusercontent.com/Winetricks/winetricks/master/src/winetricks
          chmod +x LVNM.AppDir/usr/bin/tools/*

      - name: Finalize AppDir Metadata
        run: |
          # Use your icon
          if [ -f icon.png ]; then cp icon.png LVNM.AppDir/lvnm.png; fi
          
          cat <<EOF > LVNM.AppDir/lvnm.desktop
          [Desktop Entry]
          Name=LVNM
          Exec=LVNM
          Icon=lvnm
          Type=Application
          Categories=Game;Utility;
          EOF

          cd LVNM.AppDir
          ln -s usr/bin/LVNM AppRun
          cd ..

      - name: Generate AppImage
        run: |
          curl -fLo appimagetool https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool          
          ./appimagetool --appimage-extract-and-run LVNM.AppDir/ LVNM-x86_64.AppImage

      - name: Upload Artifact (Always)
        uses: actions/upload-artifact@v4
        with:
          name: LVNM-x86_64.AppImage
          path: LVNM-x86_64.AppImage

      - name: Set Release Variables
        id: vars
        run: |
          if [ "${{ github.ref_type }}" == "tag" ]; then
            # If triggered by a tag (e.g., v1.0.0), set up a stable release
            echo "TAG_NAME=${{ github.ref_name }}" >> $GITHUB_ENV
            echo "RELEASE_NAME=LVNM Stable ${{ github.ref_name }}" >> $GITHUB_ENV
            echo "IS_PRERELEASE=false" >> $GITHUB_ENV
          else
            # If triggered by a branch push, set up the continuous rolling release
            echo "TAG_NAME=continuous" >> $GITHUB_ENV
            echo "RELEASE_NAME=Continuous Build" >> $GITHUB_ENV
            echo "IS_PRERELEASE=true" >> $GITHUB_ENV
          fi

      - name: Move Continuous Tag
        if: github.ref_type == 'branch'
        run: |
          # Force the 'continuous' git tag to move to the latest commit
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f continuous
          git push -f origin continuous

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: ${{ env.RELEASE_NAME }}
          body: |
            Automated build for commit: ${{ github.sha }}
            Download the latest AppImage below.
          files: |
            LVNM-x86_64.AppImage
            LVNM-x86_64.AppImage.sha256
          draft: false
          prerelease: ${{ env.IS_PRERELEASE == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}